<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCode Hub — Sidebar Dev Preview</title>
  <style>
    /* Simulate Obsidian's CSS variables */
    :root {
      --text-normal: #1a1a1a;
      --text-muted: #6b7280;
      --text-faint: #9ca3af;
      --text-accent: #7c3aed;
      --text-warning: #d97706;
      --text-error: #ef4444;
      --text-on-accent: #ffffff;
      --interactive-accent: #7c3aed;
      --interactive-accent-rgb: 124, 58, 237;
      --background-primary: #ffffff;
      --background-secondary: #f5f5f5;
      --background-modifier-border: #e5e7eb;
      --background-modifier-hover: rgba(0, 0, 0, 0.04);
      --background-modifier-active-hover: rgba(0, 0, 0, 0.08);
      --font-monospace: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    /* Dark mode toggle */
    html.dark {
      --text-normal: #e5e7eb;
      --text-muted: #9ca3af;
      --text-faint: #6b7280;
      --text-accent: #a78bfa;
      --text-warning: #fbbf24;
      --text-error: #f87171;
      --text-on-accent: #ffffff;
      --interactive-accent: #7c3aed;
      --interactive-accent-rgb: 124, 58, 237;
      --background-primary: #1e1e1e;
      --background-secondary: #2a2a2a;
      --background-modifier-border: #3a3a3a;
      --background-modifier-hover: rgba(255, 255, 255, 0.06);
      --background-modifier-active-hover: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }
    html.dark body {
      background: #121212;
    }

    .dev-wrapper {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 1000px;
    }

    /* Simulate Obsidian sidebar panel */
    .sidebar-frame {
      width: 360px;
      height: 700px;
      border: 1px solid var(--background-modifier-border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--background-primary);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      flex-shrink: 0;
    }
    html.dark .sidebar-frame {
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    /* Controls panel */
    .controls {
      flex: 1;
      padding: 16px;
      font-size: 13px;
      color: var(--text-normal);
      background: var(--background-primary);
      border-radius: 12px;
      border: 1px solid var(--background-modifier-border);
      overflow-y: auto;
      max-height: 700px;
    }
    .controls h3 {
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--text-muted);
    }
    .controls button {
      display: block;
      margin: 4px 0;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--background-modifier-border);
      background: var(--background-secondary);
      color: var(--text-normal);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    .controls button:hover {
      background: var(--background-modifier-hover);
    }
    .controls .section {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--background-modifier-border);
    }
  </style>
</head>
<body>
  <div class="dev-wrapper">
    <div class="sidebar-frame" id="sidebar-container"></div>
    <div class="controls">
      <div class="section">
        <h3>Theme</h3>
        <button onclick="document.documentElement.classList.toggle('dark')">Toggle Dark Mode</button>
      </div>
      <div class="section">
        <h3>Actions</h3>
        <button onclick="window.__view?.onActiveFileChanged()">Trigger File Change</button>
        <button onclick="window.__view?.onSessionChanged()">Trigger Session Change</button>
      </div>
      <div class="section">
        <h3>Resize</h3>
        <button onclick="document.querySelector('.sidebar-frame').style.width='280px'">Narrow (280px)</button>
        <button onclick="document.querySelector('.sidebar-frame').style.width='360px'">Normal (360px)</button>
        <button onclick="document.querySelector('.sidebar-frame').style.width='480px'">Wide (480px)</button>
      </div>
      <div class="section">
        <h3>Info</h3>
        <p style="font-size: 11px; color: var(--text-faint); line-height: 1.6;">
          This preview mocks the Obsidian API so you can iterate on sidebar-view.ts
          in a browser. Changes to the source are hot-reloaded by Vite.<br><br>
          <strong>Test:</strong> Type <code>/</code> in the input for slash commands,
          <code>@</code> for mentions. Use arrow keys to navigate popovers.
        </p>
      </div>
    </div>
  </div>

  <script type="module" src="./harness.ts"></script>
</body>
</html>
